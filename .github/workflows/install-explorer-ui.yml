name: Install explorer UI dependencies

on:
  push:
    branches:
      - agent/explorer-shell

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-shell
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install React explorer dependencies
        run: |
          npm install @astrojs/react@latest react@latest react-dom@latest @xyflow/react@latest elkjs@latest
          npm install --save-dev @types/react@latest @types/react-dom@latest
      - name: Commit dependency lock
        run: |
          if [ -z "$(git status --porcelain -- package.json package-lock.json)" ]; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json
          git commit -m "Install explorer UI dependencies"
          git push origin HEAD:agent/explorer-shell
