name: Patch explorer business tree

on:
  push:
    branches:
      - agent/explorer-business-tree

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-business-tree
      - name: Connect business navigator
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/explorer/ExplorerApp.tsx')
          source = path.read_text()

          import_marker = "import type { ExplorerEdge, ExplorerNode } from '../../data/explorer/schema';\n"
          navigator_import = "import BusinessNavigator from './BusinessNavigator';\n"
          if navigator_import not in source:
              source = source.replace(import_marker, import_marker + navigator_import)

          source = source.replace("  const [query, setQuery] = useState('');\n", '')

          list_state_start = source.index('  const businessNodes = useMemo(')
          list_state_end = source.index('  const selectedNode = explorerNodesById.get(selectedId);')
          source = source[:list_state_start] + source[list_state_end:]

          aside_start = source.index('      <aside className="explorer-pane explorer-list-pane"')
          main_start = source.index('      <main className="explorer-pane explorer-map-pane"', aside_start)
          replacement = '      <BusinessNavigator selectedId={selectedId} onSelect={selectNode} />\n\n'
          source = source[:aside_start] + replacement + source[main_start:]

          path.write_text(source)
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/explorer/ExplorerApp.tsx
          git commit -m "Connect explorer business navigator"
          git push origin HEAD:agent/explorer-business-tree
