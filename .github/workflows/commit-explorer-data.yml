name: Commit explorer data

on:
  push:
    branches:
      - agent/explorer-data-model

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-data-model
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Generate and commit explorer data
        run: |
          npm run generate:explorer
          if [ -z "$(git status --porcelain -- src/data/explorer/generated)" ]; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/data/explorer/generated
          git commit -m "Generate explorer graph data"
          git push origin HEAD:agent/explorer-data-model
