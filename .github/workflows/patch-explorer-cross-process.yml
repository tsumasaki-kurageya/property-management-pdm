name: Patch explorer cross-process specification

on:
  push:
    branches:
      - agent/explorer-area-process-redesign

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-area-process-redesign
      - name: Update redesign specification
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/explorer-redesign-spec.md')
          text = path.read_text()

          marker = """### 7.4 操作

プロセスノードをクリックまたはEnterすると、選択業務を維持したまま、中央の業務プロセス図を対象プロセスへ切り替える。

プロセスノードが1件だけの場合も、現在表示中のプロセス名は画面上で確認できるようにする。
"""
          addition = marker + """

### 7.5 12横断プロセスとの対応

既存の`P01`から`P12`までの12横断プロセスを、業務エクスプローラーで表示する業務プロセスの正本とする。

18業務領域と12横断プロセスの役割は次のように分ける。

- 18業務領域：業務を分類し、個別業務を探すための軸
- 12横断プロセス：複数の業務領域をまたいで、業務が開始から終了まで進む流れを示す軸

業務ノードを選択した際は、その業務IDを含む`P01`〜`P12`を抽出し、該当する横断プロセスをプロセスノードとして表示する。

```text
選択業務: BM-09-06 点検異常を判定する

この業務を含む横断プロセス
[P04 定常業務の実施] [P05 結果確認・報告] [P06 異常・修繕・復旧]
```

初期表示するプロセスは、横断プロセス正本の並び順で先頭のものとする。新たな「代表プロセス」属性は設けない。

プロセスノードを選択すると、対応する横断プロセスの業務、判断、接続を開始から終了まで中央へ表示する。

12横断プロセスを別の全体地図として常時併記せず、選択業務の文脈に応じて必要なプロセスだけを提示する。
"""
          if '### 7.5 12横断プロセスとの対応' not in text:
              if marker not in text:
                  raise SystemExit('process node operation marker not found')
              text = text.replace(marker, addition)

          old = """### 12.2 業務プロセス正本

業務プロセスは、開始から終了までの順序を正本データとして定義する。
"""
          new = """### 12.2 業務プロセス正本

業務プロセスは、`docs/04_mappings/business-process-map.md`に定義された`P01`〜`P12`の12横断プロセスを正本とする。

各横断プロセスについて、開始から終了までの業務、判断、接続順を定義する。
"""
          if old in text:
              text = text.replace(old, new)

          criterion = '- 選択業務を含む12横断プロセスがプロセスノードとして提示される\n'
          anchor = '- 選択業務を含むプロセスノード一覧が表示される\n'
          if criterion not in text and anchor in text:
              text = text.replace(anchor, anchor + criterion)

          path.write_text(text)
          PY
          rm .github/workflows/patch-explorer-cross-process.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/explorer-redesign-spec.md .github/workflows/patch-explorer-cross-process.yml
          git commit -m "12横断プロセスを業務プロセス正本として明記"
          git push origin HEAD:agent/explorer-area-process-redesign
