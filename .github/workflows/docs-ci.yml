name: Docs CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify release candidate
        id: verify
        shell: bash
        run: |
          set +e
          npm run verify > explorer-shell-verify.log 2>&1
          status=$?
          cat explorer-shell-verify.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload explorer shell diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: explorer-shell-diagnostics
          path: explorer-shell-verify.log
          if-no-files-found: error
      - name: Fail when verification failed
        if: steps.verify.outputs.status != '0'
        run: exit 1
