name: Docs CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate explorer data
        id: explorer
        shell: bash
        run: |
          set +e
          npm run generate:explorer > explorer-generator.log 2>&1
          status=$?
          cat explorer-generator.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload explorer diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: explorer-data
          path: |
            explorer-generator.log
            src/data/explorer/generated
          if-no-files-found: warn
      - name: Fail when explorer generation failed
        if: steps.explorer.outputs.status != '0'
        run: exit 1
      - name: Verify release candidate
        run: npm run check && npm run build
