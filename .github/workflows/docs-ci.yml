name: Docs CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate explorer diagnostic
        run: npm run generate:explorer
      - name: Upload explorer diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: explorer-generated-data
          path: src/data/explorer/generated
          retention-days: 1
      - name: Verify release candidate
        run: npm run verify
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run explorer end-to-end tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: explorer-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
