name: Patch explorer shell

on:
  push:
    branches:
      - agent/explorer-shell

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-shell
      - name: Use ELK browser bundle
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/explorer/ExplorerApp.tsx')
          source = path.read_text()
          source = source.replace("import ELK from 'elkjs';", "import ELK from 'elkjs/lib/elk.bundled.js';")
          path.write_text(source)
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/explorer/ExplorerApp.tsx
          git commit -m "Use ELK browser bundle"
          git push origin HEAD:agent/explorer-shell
