name: Patch explorer flow map

on:
  push:
    branches:
      - agent/explorer-flow-map

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-flow-map
      - name: Connect focused flow map
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/explorer/ExplorerApp.tsx')
          source = path.read_text()

          import_marker = "import BusinessNavigator from './BusinessNavigator';\n"
          flow_import = "import FlowMap from './FlowMap';\n"
          if flow_import not in source:
              source = source.replace(import_marker, import_marker + flow_import)

          old_effect = """  useEffect(() => {
    let active = true;
    setLayoutState('loading');
    layoutMap(selectedId, viewMode)
      .then(({ nodes, edges }) => {
        if (!active) return;
        setFlowNodes(nodes);
        setFlowEdges(edges);
        setLayoutState('ready');
      })
      .catch(() => {
        if (active) setLayoutState('error');
      });
    return () => {
      active = false;
    };
  }, [selectedId, viewMode]);
"""
          new_effect = """  useEffect(() => {
    if (viewMode === 'flow') return undefined;

    let active = true;
    setLayoutState('loading');
    layoutMap(selectedId, viewMode)
      .then(({ nodes, edges }) => {
        if (!active) return;
        setFlowNodes(nodes);
        setFlowEdges(edges);
        setLayoutState('ready');
      })
      .catch(() => {
        if (active) setLayoutState('error');
      });
    return () => {
      active = false;
    };
  }, [selectedId, viewMode]);
"""
          if old_effect not in source:
              raise SystemExit('layout effect block was not found')
          source = source.replace(old_effect, new_effect)

          old_map = """        <div className=\"explorer-map\" aria-live=\"polite\">
          {layoutState === 'loading' && <div className=\"explorer-state\">関係を配置しています…</div>}
          {layoutState === 'error' && <div className=\"explorer-state is-error\">表示データの準備に失敗しました。</div>}
          {layoutState === 'ready' && !selectedNode && <div className=\"explorer-state\">対象業務がありません。</div>}
          {layoutState === 'ready' && selectedNode && (
            <ReactFlow
              nodes={flowNodes}
              edges={flowEdges}
              fitView
              fitViewOptions={{ padding: 0.24 }}
              minZoom={0.4}
              maxZoom={1.6}
              nodesDraggable={false}
              nodesConnectable={false}
              elementsSelectable
              onNodeClick={(_event, node) => selectNode(node.id)}
              proOptions={{ hideAttribution: true }}
            >
              <Background gap={20} size={1} />
              <Controls showInteractive={false} />
            </ReactFlow>
          )}
        </div>
"""
          new_map = """        <div className=\"explorer-map\" aria-live=\"polite\">
          {viewMode === 'flow' ? (
            <FlowMap selectedId={selectedId} onSelect={selectNode} />
          ) : (
            <>
              {layoutState === 'loading' && <div className=\"explorer-state\">関係を配置しています…</div>}
              {layoutState === 'error' && <div className=\"explorer-state is-error\">表示データの準備に失敗しました。</div>}
              {layoutState === 'ready' && !selectedNode && <div className=\"explorer-state\">対象業務がありません。</div>}
              {layoutState === 'ready' && selectedNode && (
                <ReactFlow
                  nodes={flowNodes}
                  edges={flowEdges}
                  fitView
                  fitViewOptions={{ padding: 0.24 }}
                  minZoom={0.4}
                  maxZoom={1.6}
                  nodesDraggable={false}
                  nodesConnectable={false}
                  elementsSelectable
                  onNodeClick={(_event, node) => selectNode(node.id)}
                  proOptions={{ hideAttribution: true }}
                >
                  <Background gap={20} size={1} />
                  <Controls showInteractive={false} />
                </ReactFlow>
              )}
            </>
          )}
        </div>
"""
          if old_map not in source:
              raise SystemExit('map render block was not found')
          source = source.replace(old_map, new_map)
          path.write_text(source)
          PY
      - name: Commit integration
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/explorer/ExplorerApp.tsx
          git commit -m "Connect focused business flow map"
          git push origin HEAD:agent/explorer-flow-map
