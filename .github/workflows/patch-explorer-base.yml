name: Patch explorer base path

on:
  push:
    branches:
      - agent/explorer-shell

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-shell
      - name: Prefix explorer links with Astro base
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/explorer/ExplorerApp.tsx')
          source = path.read_text()
          marker = "const DEFAULT_NODE_ID = 'BM-09-06';\n"
          if "const BASE_URL = import.meta.env.BASE_URL;" not in source:
              source = source.replace(marker, "const BASE_URL = import.meta.env.BASE_URL;\n" + marker)
          source = source.replace(
              'href={selectedNode.href}',
              "href={`${BASE_URL}${selectedNode.href.replace(/^\\//, '')}`}",
          )
          path.write_text(source)
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/explorer/ExplorerApp.tsx
          git commit -m "Prefix explorer links with site base"
          git push origin HEAD:agent/explorer-shell
