name: Fix explorer quality branch

on:
  push:
    branches:
      - agent/explorer-quality
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-quality
      - name: Remove duplicated interaction settings
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          flow = Path('src/components/explorer/FlowMap.tsx')
          source = flow.read_text()
          source = re.sub(
              r"(?:  const \{ coarsePointer, reducedMotion \} = useExplorerMediaPreferences\(\);\n)+",
              "  const { coarsePointer, reducedMotion } = useExplorerMediaPreferences();\n",
              source,
          )
          flow.write_text(source)

          context = Path('src/components/explorer/ContextMap.tsx')
          source = context.read_text()
          source = re.sub(
              r"(?:  const \{ coarsePointer, reducedMotion \} = useExplorerMediaPreferences\(\);\n)+",
              "  const { coarsePointer, reducedMotion } = useExplorerMediaPreferences();\n",
              source,
          )
          source = re.sub(
              r"(?:            panOnDrag=\{!coarsePointer\}\n            zoomOnScroll=\{!coarsePointer\}\n)+",
              "            panOnDrag={!coarsePointer}\n            zoomOnScroll={!coarsePointer}\n",
              source,
          )
          context.write_text(source)
          PY
      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/explorer/FlowMap.tsx src/components/explorer/ContextMap.tsx
          git commit -m "Remove duplicated explorer interaction settings"
          git push origin HEAD:agent/explorer-quality
