name: Apply explorer workspace layout

on:
  push:
    branches:
      - agent/explorer-desktop-workspace
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-desktop-workspace
      - name: Apply desktop workspace layout
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('src/pages/explorer.astro')
          page.write_text("""---
          import StarlightPage from '@astrojs/starlight/components/StarlightPage.astro';
          import ExplorerApp from '../components/explorer/ExplorerApp';
          ---

          <StarlightPage
            frontmatter={{
              title: '業務エクスプローラー',
              description: 'ビルメンテナンス業務の前後・階層・関連を対話的に確認します。',
              template: 'splash',
              tableOfContents: false,
              pagefind: false,
            }}
          >
            <div class="explorer-page">
              <ExplorerApp client:load />
              <noscript>
                <p class="explorer-noscript">
                  業務エクスプローラーの操作にはJavaScriptが必要です。業務の詳細は
                  <a href={`${import.meta.env.BASE_URL}reference/business-catalog/`}>業務カタログ</a>
                  から確認できます。
                </p>
              </noscript>
            </div>
          </StarlightPage>

          <style is:global>
            .sl-container:has(> .explorer-page) {
              width: 100%;
              max-width: none;
              padding: 0;
            }

            .sl-container:has(> .explorer-page) > :not(.explorer-page) {
              display: none;
            }

            @media (min-width: 78rem) {
              html:has(.explorer-page),
              body:has(.explorer-page) {
                overflow: hidden;
              }

              body:has(.explorer-page) .main-pane,
              body:has(.explorer-page) .content-panel,
              body:has(.explorer-page) main {
                min-width: 0;
                overflow: hidden;
              }

              body:has(.explorer-page) .content-panel {
                padding: 0;
              }
            }
          </style>

          <style>
            .explorer-page {
              width: 100%;
              max-width: none;
              margin: 0;
              padding: 0.5rem 0.65rem 0.65rem;
            }

            .explorer-noscript {
              border: 1px solid var(--sl-color-orange);
              border-radius: 0.75rem;
              padding: 1rem;
              background: var(--sl-color-orange-low);
            }

            @media (min-width: 78rem) {
              .explorer-page {
                height: calc(100dvh - var(--sl-nav-height));
                overflow: hidden;
              }
            }

            @media (max-width: 77.99rem) {
              .explorer-page {
                padding-inline: clamp(0.5rem, 2vw, 1rem);
              }
            }
          </style>
          """.replace('\n          ', '\n').lstrip())

          shell = Path('src/components/explorer/ExplorerShell.css')
          source = shell.read_text()
          marker = '/* explorer-desktop-workspace */'
          if marker not in source:
              source += """

          /* explorer-desktop-workspace */
          @media (min-width: 78rem) {
            .explorer-shell {
              grid-template-columns: clamp(14rem, 17vw, 18rem) minmax(0, 1fr) clamp(17rem, 21vw, 22rem);
              grid-template-rows: auto minmax(0, 1fr) auto;
              gap: 0.5rem;
              height: 100%;
              min-height: 0;
            }

            .explorer-toolbar {
              min-height: 3rem;
              align-items: center;
              gap: 0.75rem;
              padding: 0;
            }

            .explorer-toolbar > div:first-child {
              display: flex;
              min-width: 0;
              align-items: baseline;
              gap: 0.65rem;
            }

            .explorer-toolbar .explorer-eyebrow {
              display: none;
            }

            .explorer-toolbar h1 {
              flex: 0 0 auto;
              font-size: 1.2rem;
              line-height: 1.2;
              white-space: nowrap;
            }

            .explorer-toolbar > div:first-child > p:last-child {
              min-width: 0;
              max-width: none;
              margin: 0;
              overflow: hidden;
              color: var(--sl-color-gray-3);
              font-size: 0.7rem;
              text-overflow: ellipsis;
              white-space: nowrap;
            }

            .explorer-toolbar-controls {
              display: flex;
              flex: 0 0 auto;
              align-items: center;
              gap: 0.45rem;
            }

            .explorer-share-row {
              min-height: auto;
            }

            .explorer-copy-status {
              position: absolute;
              right: 0.75rem;
              top: 3.2rem;
              z-index: 20;
              min-width: 0;
              border-radius: 0.4rem;
              padding: 0.25rem 0.45rem;
              background: var(--sl-color-bg);
            }

            .explorer-pane,
            .explorer-mobile-detail-slot,
            .explorer-mobile-lifecycle-slot,
            .explorer-map,
            .explorer-map-pane,
            .explorer-detail-pane,
            .explorer-list-pane {
              min-height: 0;
            }

            .explorer-pane-heading {
              min-height: 2.55rem;
              padding: 0.52rem 0.68rem;
            }

            .explorer-pane-heading h2 {
              font-size: 0.86rem;
            }

            .explorer-pane-heading small {
              font-size: 0.62rem;
            }

            .explorer-lifecycle {
              min-height: 0;
            }
          }
          """
              shell.write_text(source)

          flow = Path('src/components/explorer/FlowMap.tsx')
          source = flow.read_text()
          old = """      <div className=\"flow-map-text-alternative\" aria-label=\"仕事の流れをテキストで確認\">
                <NodeLinkList
                  title=\"この前の仕事\"
                  edges={localFlow.previous}
                  resolveId={(edge) => edge.from}
                  emptyText=\"前の仕事は登録されていません。\"
                  onSelect={onSelect}
                />
                <NodeLinkList
                  title=\"この後の仕事\"
                  edges={localFlow.next}
                  resolveId={(edge) => edge.to}
                  emptyText=\"通常の後続業務は登録されていません。\"
                  onSelect={onSelect}
                />
                <NodeLinkList
                  title=\"条件で分かれる仕事\"
                  edges={localFlow.branches}
                  resolveId={(edge) => edge.to}
                  emptyText=\"条件分岐は登録されていません。\"
                  onSelect={onSelect}
                />
              </div>""".replace('              ', '      ')
          new = """      <details className=\"flow-map-text-panel\">
                <summary>仕事の流れをテキストで確認</summary>
                <div className=\"flow-map-text-alternative\" aria-label=\"仕事の流れをテキストで確認\">
                  <NodeLinkList
                    title=\"この前の仕事\"
                    edges={localFlow.previous}
                    resolveId={(edge) => edge.from}
                    emptyText=\"前の仕事は登録されていません。\"
                    onSelect={onSelect}
                  />
                  <NodeLinkList
                    title=\"この後の仕事\"
                    edges={localFlow.next}
                    resolveId={(edge) => edge.to}
                    emptyText=\"通常の後続業務は登録されていません。\"
                    onSelect={onSelect}
                  />
                  <NodeLinkList
                    title=\"条件で分かれる仕事\"
                    edges={localFlow.branches}
                    resolveId={(edge) => edge.to}
                    emptyText=\"条件分岐は登録されていません。\"
                    onSelect={onSelect}
                  />
                </div>
              </details>""".replace('              ', '      ')
          if 'className="flow-map-text-panel"' not in source:
              if old not in source:
                  raise SystemExit('FlowMap text alternative block not found')
              source = source.replace(old, new)
              flow.write_text(source)

          flow_css = Path('src/components/explorer/FlowMap.css')
          source = flow_css.read_text()
          marker = '/* explorer-workspace-flow */'
          if marker not in source:
              source += """

          /* explorer-workspace-flow */
          .flow-map-text-panel {
            border-top: 1px solid var(--explorer-border);
            background: var(--sl-color-bg-nav);
          }

          .flow-map-text-panel > summary {
            padding: 0.45rem 0.72rem;
            color: var(--sl-color-gray-2);
            font-size: 0.67rem;
            font-weight: 700;
            cursor: pointer;
          }

          .flow-map-text-panel > summary:hover,
          .flow-map-text-panel > summary:focus-visible {
            color: var(--sl-color-text-accent);
            outline: none;
          }

          @media (min-width: 78rem) {
            .flow-map-view {
              grid-template-rows: auto minmax(0, 1fr) auto auto;
            }

            .flow-map-canvas {
              min-height: 0;
            }

            .flow-map-context {
              padding: 0.48rem 0.65rem;
            }

            .flow-map-context small {
              display: none;
            }

            .flow-map-legend {
              padding: 0.4rem 0.65rem;
            }

            .flow-map-text-alternative {
              max-height: 11rem;
            }
          }
          """
              flow_css.write_text(source)

          context = Path('src/components/explorer/ContextMap.tsx')
          source = context.read_text()
          old = """      {data.informationState === 'available' && (
                <div className=\"context-map-list\" aria-label=\"表示中の関係を文字で確認\">
                  <div className=\"context-map-list-heading\">
                    <strong>{selectedNode?.label ?? selectedId}</strong>
                    <span>表示中の関係</span>
                  </div>
                  <ul>
                    {data.textItems.map((item) => (
                      <li key={`${item.relation}-${item.id}`}>
                        <button type=\"button\" onClick={() => onSelect(item.id)}>
                          <span>{item.relation}</span>
                          <strong>{item.label}</strong>
                          <small>{nodeTypeLabels[item.type]} · {item.id}</small>
                        </button>
                      </li>
                    ))}
                  </ul>
                  {data.omitted > 0 && (
                    <button className=\"context-map-more\" type=\"button\" onClick={() => setExpanded((value) => !value)}>
                      {expanded ? '表示を絞る' : `さらに表示（残り${data.omitted}件）`}
                    </button>
                  )}
                </div>
              )}""".replace('              ', '      ')
          new = """      {data.informationState === 'available' && (
                <details className=\"context-map-text-panel\">
                  <summary>表示中の関係をテキストで確認</summary>
                  <div className=\"context-map-list\" aria-label=\"表示中の関係を文字で確認\">
                    <div className=\"context-map-list-heading\">
                      <strong>{selectedNode?.label ?? selectedId}</strong>
                      <span>表示中の関係</span>
                    </div>
                    <ul>
                      {data.textItems.map((item) => (
                        <li key={`${item.relation}-${item.id}`}>
                          <button type=\"button\" onClick={() => onSelect(item.id)}>
                            <span>{item.relation}</span>
                            <strong>{item.label}</strong>
                            <small>{nodeTypeLabels[item.type]} · {item.id}</small>
                          </button>
                        </li>
                      ))}
                    </ul>
                    {data.omitted > 0 && (
                      <button className=\"context-map-more\" type=\"button\" onClick={() => setExpanded((value) => !value)}>
                        {expanded ? '表示を絞る' : `さらに表示（残り${data.omitted}件）`}
                      </button>
                    )}
                  </div>
                </details>
              )}""".replace('              ', '      ')
          if 'className="context-map-text-panel"' not in source:
              if old not in source:
                  raise SystemExit('ContextMap text list block not found')
              source = source.replace(old, new)
              context.write_text(source)

          context_css = Path('src/components/explorer/ContextMap.css')
          source = context_css.read_text()
          marker = '/* explorer-workspace-context */'
          if marker not in source:
              source += """

          /* explorer-workspace-context */
          .context-map-text-panel {
            border-top: 1px solid var(--explorer-border);
            background: var(--sl-color-bg-nav);
          }

          .context-map-text-panel > summary {
            padding: 0.45rem 0.72rem;
            color: var(--sl-color-gray-2);
            font-size: 0.67rem;
            font-weight: 700;
            cursor: pointer;
          }

          .context-map-text-panel > summary:hover,
          .context-map-text-panel > summary:focus-visible {
            color: var(--sl-color-text-accent);
            outline: none;
          }

          @media (min-width: 78rem) {
            .context-map-view {
              grid-template-rows: auto auto minmax(0, 1fr) auto auto;
            }

            .context-map-canvas {
              min-height: 0;
            }

            .context-map-context {
              padding: 0.48rem 0.65rem;
            }

            .context-map-context small {
              display: none;
            }

            .context-map-filters {
              padding: 0.38rem 0.55rem;
            }

            .context-map-list {
              max-height: 12rem;
              overflow: auto;
            }
          }
          """
              context_css.write_text(source)

          lifecycle = Path('src/components/explorer/LifecycleNavigator.tsx')
          source = lifecycle.read_text()
          source = source.replace(
              '        <div className="lifecycle-current-summary" aria-live="polite">',
              '        <details className="lifecycle-current-details">\n          <summary>現在位置と所属プロセスの詳細</summary>\n          <div className="lifecycle-current-summary" aria-live="polite">',
          )
          source = source.replace(
              '        </div>\n      </div>\n    </footer>',
              '          </div>\n        </details>\n      </div>\n    </footer>',
              1,
          )
          lifecycle.write_text(source)

          lifecycle_css = Path('src/components/explorer/LifecycleNavigator.css')
          source = lifecycle_css.read_text()
          marker = '/* explorer-workspace-lifecycle */'
          if marker not in source:
              source += """

          /* explorer-workspace-lifecycle */
          .lifecycle-current-details > summary {
            color: var(--sl-color-gray-2);
            font-size: 0.65rem;
            font-weight: 700;
            cursor: pointer;
          }

          .lifecycle-current-details[open] > summary {
            margin-bottom: 0.45rem;
          }

          @media (min-width: 78rem) {
            .lifecycle-navigator {
              grid-template-columns: minmax(11rem, 0.25fr) minmax(0, 1.75fr);
              gap: 0.65rem;
              padding: 0.48rem 0.65rem;
            }

            .lifecycle-heading > p:last-child {
              display: none;
            }

            .lifecycle-heading h2 {
              font-size: 0.78rem;
            }

            .lifecycle-body {
              gap: 0.3rem;
            }

            .lifecycle-body li button {
              min-height: 3rem;
              padding: 0.32rem 0.42rem;
            }

            .lifecycle-current-details {
              position: relative;
            }

            .lifecycle-current-details[open] .lifecycle-current-summary {
              position: absolute;
              right: 0;
              bottom: calc(100% + 0.45rem);
              z-index: 30;
              width: min(48rem, 80vw);
              max-height: 18rem;
              overflow: auto;
              border: 1px solid var(--explorer-border);
              border-radius: 0.65rem;
              padding: 0.65rem;
              background: var(--sl-color-bg);
              box-shadow: 0 0.75rem 2rem rgb(0 0 0 / 18%);
            }
          }
          """
              lifecycle_css.write_text(source)

          tests = Path('tests/e2e/explorer.spec.ts')
          source = tests.read_text()
          source = source.replace(
              "  const textAlternative = explorer.getByLabel('仕事の流れをテキストで確認');\n  await expect(textAlternative).toBeVisible();",
              "  const textPanel = explorer.locator('.flow-map-text-panel');\n  await textPanel.getByText('仕事の流れをテキストで確認').click();\n  const textAlternative = explorer.getByLabel('仕事の流れをテキストで確認');\n  await expect(textAlternative).toBeVisible();",
          )
          if "PCではヘッダー下を使い切る" not in source:
              source += """

          test('PCではヘッダー下を使い切るワークスペースとして表示する', async ({ page }, testInfo) => {
            test.skip(testInfo.project.name !== 'desktop');
            await openRepresentative(page);

            const metrics = await page.evaluate(() => {
              const shell = document.querySelector<HTMLElement>('.explorer-shell');
              const map = document.querySelector<HTMLElement>('.explorer-map-pane');
              const pageRoot = document.querySelector<HTMLElement>('.explorer-page');
              if (!shell || !map || !pageRoot) throw new Error('Explorer layout elements not found');
              const shellRect = shell.getBoundingClientRect();
              const mapRect = map.getBoundingClientRect();
              const pageRect = pageRoot.getBoundingClientRect();
              return {
                viewportWidth: window.innerWidth,
                viewportHeight: window.innerHeight,
                documentScrollHeight: document.documentElement.scrollHeight,
                pageWidth: pageRect.width,
                shellWidth: shellRect.width,
                shellBottom: shellRect.bottom,
                mapWidth: mapRect.width,
              };
            });

            expect(metrics.pageWidth / metrics.viewportWidth).toBeGreaterThan(0.96);
            expect(metrics.mapWidth / metrics.shellWidth).toBeGreaterThan(0.5);
            expect(metrics.documentScrollHeight).toBeLessThanOrEqual(metrics.viewportHeight + 2);
            expect(metrics.shellBottom).toBeLessThanOrEqual(metrics.viewportHeight + 2);
          });
          """
          tests.write_text(source)
          PY
      - name: Validate changes
        run: |
          npm ci
          npm run verify
      - name: Commit workspace layout
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/pages/explorer.astro src/components/explorer/ExplorerShell.css src/components/explorer/FlowMap.tsx src/components/explorer/FlowMap.css src/components/explorer/ContextMap.tsx src/components/explorer/ContextMap.css src/components/explorer/LifecycleNavigator.tsx src/components/explorer/LifecycleNavigator.css tests/e2e/explorer.spec.ts
          git commit -m "Redesign explorer desktop workspace"
          git push origin HEAD:agent/explorer-desktop-workspace
