name: Apply explorer acceptance fixes

on:
  push:
    branches:
      - agent/explorer-quality
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/explorer-quality
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Add representative flow relations and contrast fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          critical = Path('docs/04_mappings/critical-business-analysis.md')
          source = critical.read_text()
          section_start = source.index('### 4.6 BM-09-06 点検異常を判定する')
          section_end = source.index('\n### 4.7 ', section_start)
          section = source[section_start:section_end]
          marker = '| 完了条件 | 判定根拠と後続経路が記録され、異常時は対応責任者が受領している |\n'
          additions = (
              '| 前工程 | BM-09-05 |\n'
              '| 通常後続 | BM-09-10 |\n'
              '| 異常時後続 | BM-10-01 |\n'
          )
          if '| 前工程 | BM-09-05 |' not in section:
              section = section.replace(marker, marker + additions)
              source = source[:section_start] + section + source[section_end:]
              critical.write_text(source)

          generator = Path('scripts/generate-explorer-data.mjs')
          source = generator.read_text()
          marker = "  const roleText = values.get('実施主体・判断主体') ?? '';\n"
          relation_code = """  const flowRelations = [
    { key: '前工程', type: 'precedes', direction: 'incoming', scenario: 'previous' },
    { key: '通常後続', type: 'precedes', direction: 'outgoing', scenario: 'normal' },
    { key: '異常時後続', type: 'branches_to', direction: 'outgoing', scenario: 'abnormal' },
  ];
  for (const relation of flowRelations) {
    for (const targetId of expandBusinessReferences(values.get(relation.key) ?? '', catalog)) {
      const from = relation.direction === 'incoming' ? targetId : item.id;
      const to = relation.direction === 'incoming' ? item.id : targetId;
      addEdge({
        type: relation.type,
        from,
        to,
        label: relation.key,
        source: { path: 'docs/04_mappings/critical-business-analysis.md' },
        metadata: { basis: 'critical-business-analysis', scenario: relation.scenario },
      });
    }
  }
"""
          if "key: '通常後続'" not in source:
              source = source.replace(marker, relation_code + marker)
              generator.write_text(source)

          flow = Path('src/components/explorer/FlowMap.tsx')
          source = flow.read_text()
          source = source.replace(
              "function edgePriority(edge: ExplorerEdge): number {\n  if (edge.metadata?.basis === 'process-map') return 0;\n  if (edge.metadata?.basis === 'catalog-order') return 2;\n  return 1;\n}",
              "function edgePriority(edge: ExplorerEdge): number {\n  if (edge.metadata?.basis === 'critical-business-analysis') return 0;\n  if (edge.metadata?.basis === 'process-map') return 1;\n  if (edge.metadata?.basis === 'catalog-order') return 2;\n  return 3;\n}",
          )
          source = source.replace(
              ".filter((edge) => edge.type === 'branches_to' && edge.from === selectedId)\n    .slice(0, 3);",
              ".filter((edge) => edge.type === 'branches_to' && edge.from === selectedId)\n    .sort((left, right) => edgePriority(left) - edgePriority(right))\n    .slice(0, 3);",
          )
          flow.write_text(source)

          css = Path('src/components/explorer/ExplorerShell.css')
          source = css.read_text()
          source = source.replace(
              ".explorer-view-tabs button.is-active {\n  color: var(--sl-color-white);",
              ".explorer-view-tabs button.is-active {\n  color: #fff;",
          )
          source = source.replace(
              "  color: var(--sl-color-text-accent);\n  background: var(--sl-color-accent-low);\n  font-size: 0.68rem;",
              "  color: var(--sl-color-text);\n  background: var(--sl-color-accent-low);\n  font-size: 0.68rem;",
          )
          source = source.replace(
              ".explorer-reference-link {\n  display: inline-flex;\n  border-radius: 0.48rem;\n  padding: 0.5rem 0.7rem;\n  color: var(--sl-color-white);",
              ".explorer-reference-link {\n  display: inline-flex;\n  border-radius: 0.48rem;\n  padding: 0.5rem 0.7rem;\n  color: #fff;",
          )
          source = source.replace(
              ".explorer-reference-link:hover {\n  color: var(--sl-color-white);",
              ".explorer-reference-link:hover {\n  color: #fff;",
          )
          css.write_text(source)
          PY
      - name: Install dependencies
        run: npm ci
      - name: Regenerate explorer data
        run: npm run generate:explorer
      - name: Commit acceptance fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/04_mappings/critical-business-analysis.md scripts/generate-explorer-data.mjs src/components/explorer/FlowMap.tsx src/components/explorer/ExplorerShell.css src/data/explorer/generated
          git commit -m "Fix explorer representative flow and contrast"
          git push origin HEAD:agent/explorer-quality
